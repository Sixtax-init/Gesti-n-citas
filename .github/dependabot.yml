version: 2
updates:
  # Backend (Express + TypeScript)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"

  # Frontend (React + Vite)
  - package-ecosystem: "npm"
    directory: "/project_final"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci-cd"
