name: "Gestión Académica: Calidad y Seguridad (DevOps)"
run-name: "🚀 DevOps: ${{ github.ref_name }} (#${{ github.run_number }})"

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      run_quality_check:
        description: '✅ Ejecutar Validaciones (Lint & Build)'
        required: true
        type: boolean
        default: true
      run_security_scan:
        description: '🛡️ Ejecutar Escáner de Vulnerabilidades (CodeQL)'
        required: true
        type: boolean
        default: true


jobs:
  pipeline:
    name: Pipeline de Calidad y Seguridad
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Código
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Detectar Secrets (TruffleHog)
        id: trufflehog
        # Solo corre en push/PR — en workflow_dispatch y schedule no hay diff que escanear
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        # trufflesecurity/trufflehog@v3.94.2
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b
        with:
          path: ./
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json

      - name: Configurar Node.js (v20)
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            project_final/package-lock.json

      # ─── BACKEND (server/) ─────────────────────────────────────────────────

      - name: "[Backend] Instalar Dependencias"
        working-directory: server
        run: npm ci

      - name: "[Backend] Verificar Estilo (Lint)"
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_quality_check == true }}
        working-directory: server
        run: npx eslint src/ --format json --output-file ../eslint-server-report.json || echo "LINT_SERVER_FAILED=true" >> $GITHUB_ENV

      - name: "[Backend] Auditar Dependencias"
        id: audit_server
        working-directory: server
        run: npm audit --audit-level=high --json > ../npm-audit-server.json 2>&1 || echo "AUDIT_SERVER_FAILED=true" >> $GITHUB_ENV

      - name: "[Backend] Validar Construcción (tsc)"
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_quality_check == true }}
        working-directory: server
        run: npm run build 2> ../build_server_error.log || echo "BUILD_SERVER_FAILED=true" >> $GITHUB_ENV
        env:
          DATABASE_URL: "postgres://dummy:dummy@localhost:5432/dummy"
          JWT_SECRET: "ci_test_secret_key_only"
          SESSION_SECRET: "ci_test_session_secret_key_only"

      # ─── FRONTEND (project_final/) ─────────────────────────────────────────

      - name: "[Frontend] Instalar Dependencias"
        working-directory: project_final
        run: npm ci

      - name: "[Frontend] Verificar Estilo (Lint)"
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_quality_check == true }}
        working-directory: project_final
        run: npx eslint src/ --format json --output-file ../eslint-frontend-report.json || echo "LINT_FRONTEND_FAILED=true" >> $GITHUB_ENV

      - name: "[Frontend] Auditar Dependencias"
        id: audit_frontend
        working-directory: project_final
        run: npm audit --audit-level=high --json > ../npm-audit-frontend.json 2>&1 || echo "AUDIT_FRONTEND_FAILED=true" >> $GITHUB_ENV

      - name: "[Frontend] Validar Construcción (vite build)"
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_quality_check == true }}
        working-directory: project_final
        run: npm run build 2> ../build_frontend_error.log || echo "BUILD_FRONTEND_FAILED=true" >> $GITHUB_ENV
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      # ─── SEGURIDAD (CodeQL) ────────────────────────────────────────────────

      - name: Inicializar CodeQL
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_security_scan == true }}
        # github/codeql-action@v3
        uses: github/codeql-action/init@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c
        with:
          languages: 'javascript-typescript'
          queries: security-extended,security-and-quality

      - name: Analizar Vulnerabilidades (CodeQL)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_security_scan == true }}
        # github/codeql-action@v3
        uses: github/codeql-action/analyze@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c
        with:
          category: "/language:javascript-typescript"

      # ─── RESUMEN ───────────────────────────────────────────────────────────

      - name: Generar Resumen Ejecutivo Final
        if: always()
        run: |
          echo "## 📋 Reporte Ejecutivo de Calidad y Seguridad" >> $GITHUB_STEP_SUMMARY

          # Secrets
          echo "### 🔑 Detección de Secrets (TruffleHog)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.trufflehog.outcome }}" == "failure" ]; then
            echo "❌ **SECRETS DETECTADOS**: TruffleHog encontró secrets expuestos en el código." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trufflehog.outcome }}" == "success" ]; then
            echo "✅ **SIN SECRETS**: No se detectaron secrets expuestos." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **OMITIDO O FALLIDO**: No se pudo completar el escaneo de secrets." >> $GITHUB_STEP_SUMMARY
          fi

          # Auditoría de dependencias
          echo "### 📦 Vulnerabilidades en Dependencias (npm audit)" >> $GITHUB_STEP_SUMMARY
          echo "| Proyecto | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          if [ "$AUDIT_SERVER_FAILED" == "true" ]; then
            CRIT_S=$(python3 -c "import json,sys; d=json.load(open('npm-audit-server.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "?")
            HIGH_S=$(python3 -c "import json,sys; d=json.load(open('npm-audit-server.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "?")
            echo "| Backend (server) | ❌ Críticas: ${CRIT_S}, Altas: ${HIGH_S} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend (server) | ✅ Sin vulnerabilidades altas o críticas |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$AUDIT_FRONTEND_FAILED" == "true" ]; then
            CRIT_F=$(python3 -c "import json,sys; d=json.load(open('npm-audit-frontend.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "?")
            HIGH_F=$(python3 -c "import json,sys; d=json.load(open('npm-audit-frontend.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "?")
            echo "| Frontend (project_final) | ❌ Críticas: ${CRIT_F}, Altas: ${HIGH_F} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend (project_final) | ✅ Sin vulnerabilidades altas o críticas |" >> $GITHUB_STEP_SUMMARY
          fi

          # Lint
          echo "### 🎨 Estilo y Estándares (ESLint)" >> $GITHUB_STEP_SUMMARY
          echo "| Proyecto | Errores | Avisos |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          for proj in server frontend; do
            report="eslint-${proj}-report.json"
            label="Backend (server)"
            [ "$proj" == "frontend" ] && label="Frontend (project_final)"
            if [ -f "$report" ]; then
              ERR=$(python3 -c "import json; d=json.load(open('$report')); print(sum(f['errorCount'] for f in d))" 2>/dev/null || echo "?")
              WARN=$(python3 -c "import json; d=json.load(open('$report')); print(sum(f['warningCount'] for f in d))" 2>/dev/null || echo "?")
              ICON="✅"
              [ "${ERR}" != "0" ] && [ "${ERR}" != "?" ] && ICON="❌"
              echo "| ${label} | ${ICON} ${ERR} | ${WARN} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${label} | ⚠️ Omitido | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Construcción
          echo "### 🏗️ Estado de la Construcción" >> $GITHUB_STEP_SUMMARY
          echo "| Proyecto | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          if [ "$BUILD_SERVER_FAILED" == "true" ]; then
            echo "| Backend (server) | ❌ FALLÓ |" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Error Backend</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 15 build_server_error.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend (server) | ✅ Exitosa |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$BUILD_FRONTEND_FAILED" == "true" ]; then
            echo "| Frontend (project_final) | ❌ FALLÓ |" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Error Frontend</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 15 build_frontend_error.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend (project_final) | ✅ Exitosa |" >> $GITHUB_STEP_SUMMARY
          fi

          # CodeQL
          echo "### 🛡️ Escaneo de Seguridad (CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **ANÁLISIS COMPLETADO**: Revisa la pestaña 'Security > Code scanning' en GitHub para ver resultados detallados." >> $GITHUB_STEP_SUMMARY

          # Fallo del pipeline si hay problemas críticos
          if [ "$BUILD_SERVER_FAILED" == "true" ] || [ "$BUILD_FRONTEND_FAILED" == "true" ] || [ "$AUDIT_SERVER_FAILED" == "true" ] || [ "$AUDIT_FRONTEND_FAILED" == "true" ] || [ "$LINT_SERVER_FAILED" == "true" ] || [ "$LINT_FRONTEND_FAILED" == "true" ]; then
            exit 1
          fi
